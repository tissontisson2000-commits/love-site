<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>❤️ Happy Birthday</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  color: white;
}

h1 {
  margin-top: 30px;
  font-size: 30px;
}

#typing {
  font-size: 20px;
  margin: 20px;
}

button {
  padding: 12px 20px;
  border: none;
  background: #ff4d6d;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 20px;
}

img {
  width: 180px;
  border-radius: 15px;
  margin: 10px;
}
</style>
</head>

<body>

<h1>Happy Birthday My Love ❤️</h1>

<p id="typing"></p>

<h2 id="timer"></h2>

<!-- صور -->
<img src="https://via.placeholder.com/180">
<img src="https://via.placeholder.com/180">

<br>

<button onclick="surprise()">اضغطي هنا 🎁</button>

<!-- موسيقى -->
<audio autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

// ✍️ كتابة حرف حرف
let text = "كل سنة وانتي احلى حاجة في حياتي ❤️";
let i = 0;

function typeWriter() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeWriter, 70);
  }
}
typeWriter();

// ⏳ العداد
let startDate = new Date("2024-01-01"); // غير التاريخ ده

function updateTimer() {
  let now = new Date();
  let diff = now - startDate;

  let days = Math.floor(diff / (1000 * 60 * 60 * 24));

  document.getElementById("timer").innerHTML =
    "بقالنا مع بعض: " + days + " يوم ❤️";
}

setInterval(updateTimer, 1000);

// 🎁 مفاجأة
function surprise() {
  alert("بحبك جدًا ❤️ كل سنة وانتي معايا");
}

</script>

</body>
</html>
