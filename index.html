<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Gift Website</title>
<style>
body{
margin:0;
font-family:Arial;
direction:rtl;
background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
color:white;
overflow-x:hidden;
}

.page{display:none;}
.active{display:block;}

.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
}

input{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
width:200px;
text-align:center;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

.hearts::before{
content:"❤ ❤ ❤ ❤ ❤ ❤ ❤";
position:fixed;
width:100%;
animation:float 6s linear infinite;
opacity:0.2;
font-size:30px;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

.box{
text-align:center;
padding:20px;
}

img{
width:200px;
border-radius:20px;
margin-top:10px;
}

.count{
font-size:20px;
margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="login" class="page active center">
<h2>ادخل الباسورد ❤️</h2>
<input type="password" id="pass" placeholder="Password">
<button onclick="check()">دخول</button>
<p id="err"></p>
</div>

<!-- MAIN PAGE -->
<div id="main" class="page hearts">

<div class="box">
<h1>❤️ موقعنا الخاص ❤️</h1>

<!-- الصورة (مدمجة SVG) -->
<img src="data:image/svg+xml;utf8,
<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'>
<rect width='100%25' height='100%25' fill='%23ff4d6d'/>
<text x='50%25' y='50%25' font-size='20' text-anchor='middle' fill='white'>Your Photo Here</text>
</svg>">

<h2>من 23/1/2025 ❤️</h2>
<div class="count" id="counter"></div>

<!-- يوتيوب اغنية Perfect -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/2Vv-BfVoq4g?autoplay=1"
allow="autoplay">
</iframe>

</div>

</div>

<script>

// password
function check(){
let p=document.getElementById("pass").value;
if(p==="6/4/2009"){
document.getElementById("login").classList.remove("active");
document.getElementById("main").classList.add("active");
startCounter();
}else{
document.getElementById("err").innerHTML="غلط في الباسورد!";
}
}

// countdown live
function startCounter(){
let start=new Date("2025-01-23").getTime();

setInterval(()=>{
let now=new Date().getTime();
let diff=now-start;

let d=Math.floor(diff/(1000*60*60*24));
let h=Math.floor(diff/(1000*60*60))%24;
let m=Math.floor(diff/(1000*60))%60;
let s=Math.floor(diff/1000)%60;

document.getElementById("counter").innerHTML=
d+" يوم "+h+" ساعة "+m+" دقيقة "+s+" ثانية ❤️";

},1000);
}

</script>

</body>
</html>
