<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 Love Gift</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;

/* 🌌 خلفية رايقة جدًا */
background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* 🌙 شاشة الدخول */
#login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input{
padding:10px;
border:none;
border-radius:10px;
outline:none;
}

button{
padding:10px 20px;
margin-top:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* 💞 الصفحة الرئيسية */
#main{
display:none;
padding-top:30px;
}

#counter{
font-size:20px;
margin-top:20px;
}

#msg{
margin-top:20px;
white-space:pre-wrap;
font-size:18px;
max-width:90%;
margin-left:auto;
margin-right:auto;
}

/* ❤️ قلوب */
.heart{
position:absolute;
color:pink;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(100vh)}
}

/* 🎁 مفاجأة */
#surprise{
display:none;
margin-top:20px;
font-size:18px;
color:#ffb6c1;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
<h2>💖 Enter Password</h2>
<input type="password" id="pass" placeholder="password">
<button onclick="check()">دخول</button>
</div>

<!-- 💞 MAIN -->
<div id="main">

<h1>💖 Happy Love</h1>

<div id="counter"></div>

<button onclick="typeMsg()">💌 الرسالة</button>

<div id="msg"></div>

<button onclick="surprise()">🎁 مفاجأة</button>

<div id="surprise">
💖 بحبك اوي اوي اوي اوي اوي اوي اوي اوي 💖<br>
ربنا يخليكي ليا يا روح قلبي 💍💞💎
</div>

<audio autoplay loop>
<source src="music.mp3">
</audio>

</div>

<script>

let start = new Date("2025-01-23");

/* ⏳ العداد */
setInterval(()=>{
let now=new Date();
let diff=now-start;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor(diff/(1000*60*60))%24;
let mins=Math.floor(diff/(1000*60))%60;
let sec=Math.floor(diff/1000)%60;

document.getElementById("counter").innerHTML=
days+" يوم ❤️ "+hours+" ساعة ⏰ "+mins+" دقيقة "+sec+" ثانية";
},1000);

/* 🔐 الباسورد */
function check(){
let p=document.getElementById("pass").value;

if(p==="6/4/2009"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
}
else{
alert("غلط 😏 حاول تاني");
}
}

/* 💌 رسالة حرف حرف */
function typeMsg(){
let text="كل سنه وانتي طيبه يروح قلبي ❤️\nعقبال مليون سنه سعيده وانتي معايا 💞\nربنا يديلك طولة العمر ويجعل يومي قبل يومك 💍";
let i=0;
document.getElementById("msg").innerHTML="";

let x=setInterval(()=>{
document.getElementById("msg").innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(x);
},70);
}

/* 🎁 مفاجأة */
function surprise(){
document.getElementById("surprise").style.display="block";

for(let i=0;i<60;i++){
let h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}
}

/* ❤️ قلوب مستمرة */
setInterval(()=>{
let h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
