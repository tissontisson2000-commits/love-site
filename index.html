<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>💖 Love Surprise</title>

<style>
body{
margin:0;
font-family:Arial;
overflow:hidden;
text-align:center;
color:white;
background:linear-gradient(-45deg,#ff4e50,#f9d423,#ff6a88,#ff99ac);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

#login,#main{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

input{
padding:10px;
border:none;
border-radius:10px;
margin:5px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

#counter{
font-size:20px;
margin-top:20px;
}

#msg{
margin-top:20px;
font-size:18px;
white-space:pre-wrap;
max-width:90%;
}

.heart{
position:absolute;
color:red;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(100vh)}
}

#surprise{
display:none;
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="login">
<h2>💖 Enter Password</h2>
<input type="password" id="pass" placeholder="password">
<button onclick="check()">Open</button>
</div>

<!-- 💞 MAIN -->
<div id="main" style="display:none;">

<h1>💖 Happy Love</h1>

<div id="counter"></div>

<button onclick="typeMsg()">💌 Show Message</button>

<div id="msg"></div>

<button onclick="surprise()">🎁 Surprise</button>

<div id="surprise">💖 بحبك اوي اوي اوي اوي اوي اوي اوي اوي 💖<br>
ربنا يخليكي ليا يا روح قلبي 💍💞💎</div>

<audio autoplay loop>
<source src="music.mp3">
</audio>

</div>

<script>

let start=new Date("2025-01-23");

// ⏳ counter
setInterval(()=>{
let now=new Date();
let diff=now-start;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor(diff/(1000*60*60))%24;
let mins=Math.floor(diff/(1000*60))%60;
let sec=Math.floor(diff/1000)%60;

document.getElementById("counter").innerHTML=
days+" يوم ❤️ "+hours+" ساعة ⏰ "+mins+" دقيقة "+sec+" ثانية";
},1000);

// 🔐 password
function check(){
let p=document.getElementById("pass").value;

if(p==="6/4/2009"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="flex";
}
else{
alert("غلط 😏");
}
}

// 💌 type message
function typeMsg(){
let text="كل سنه وانتي طيبه يروح قلبي ❤️\nوعقبال مليون سنه وانتي معايا 💞\nربنا يديلك طولة العمر ويجعل يومي قبل يومك 💍";
let i=0;
document.getElementById("msg").innerHTML="";

let x=setInterval(()=>{
document.getElementById("msg").innerHTML+=text[i];
i++;
if(i>=text.length)clearInterval(x);
},70);
}

// 🎁 surprise
function surprise(){
document.getElementById("surprise").style.display="block";

for(let i=0;i<50;i++){
let h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
}
}

// ❤️ floating hearts always
setInterval(()=>{
let h=document.createElement("div");
h.classList.add("heart");
h.innerHTML="💖";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
